name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 9 * * 1"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm qlander:check
      - run: pnpm audit:high
